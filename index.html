<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>~/home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --green: #00ff41;
      --green-dim: #00aa2b;
      --green-lo: #005514;
      --red: #ff4444;
      --yellow: #ffd700;
      --blue: #4fc3f7;
      --mono: "JetBrains Mono", "Cascadia Code", "Fira Mono", "Consolas", monospace;
    }

    html, body { height: 100%; }
    html { background: var(--bg); color: var(--green); font-family: var(--mono); }

    body {
      height: 100vh;
      padding: 3rem 1.5rem 2rem;
      background-image: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,.12) 3px, rgba(0,0,0,.12) 4px
      );
      display: flex;
      flex-direction: column;
    }

    .terminal {
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .titlebar {
      display: flex; align-items: center; gap: .75rem;
      border: 1px solid var(--green-lo); border-bottom: none;
      padding: .45rem 1rem; font-size: .7rem;
      color: var(--green-dim); letter-spacing: .1em; user-select: none;
    }
    .titlebar-dots { display: flex; gap: .4rem; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green-lo); }
    .titlebar-title { flex: 1; text-align: center; }

    .window {
      border: 1px solid var(--green-lo);
      padding: 2rem 2rem 1.5rem;
      line-height: 1.85;
      cursor: text;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    #history-output { flex: 1; margin-bottom: .5rem; }

    .entry { margin-bottom: .25rem; }
    .entry-cmd { display: flex; flex-wrap: wrap; gap: .4rem; align-items: baseline; font-size: .95rem; }
    .entry-out { padding-left: 1.25rem; font-size: .95rem; white-space: pre-wrap; }
    .entry-out.err { color: var(--red); }
    .entry-out.info { color: var(--green-dim); }
    .dir-name  { color: var(--blue); }
    .file-name { color: var(--green); }
    .file-link { color: var(--green); text-decoration: underline; text-decoration-color: var(--green-lo); text-underline-offset: 3px; }
    .file-link:hover { text-decoration-color: var(--green); }
    .file-link:focus-visible { outline: 1px dashed var(--green); outline-offset: 2px; }

    .prompt { white-space: nowrap; }
    .p-user  { color: var(--green); font-weight: 700; }
    .p-host  { color: var(--green-dim); }
    .p-sep   { color: var(--green-dim); }
    .p-path  { color: var(--blue); }
    .p-arrow { color: var(--green-dim); }

    .input-line {
      display: flex; align-items: center; gap: .4rem;
      margin-top: .25rem; font-size: .95rem;
    }
    #cmd-input {
      background: transparent; border: none; outline: none;
      color: var(--green); font-family: var(--mono); font-size: .95rem;
      caret-color: var(--green); flex: 1; line-height: 1.85;
    }

    .cursor {
      display: inline-block; width: .55em; height: 1.1em;
      background: var(--green); vertical-align: text-bottom;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @media (prefers-reduced-motion: reduce) { .cursor { animation: none; } }

    @media (max-width: 480px) {
      body { padding: 1rem .75rem 1rem; }
      .window { padding: 1.25rem 1rem 1.5rem; }
      .entry-cmd, .entry-out, #cmd-input { font-size: .82rem; }
    }
  </style>
</head>
<body>
<main class="terminal" role="main" style="flex:1;display:flex;flex-direction:column;min-height:0;">

  <div class="titlebar" aria-hidden="true">
    <div class="titlebar-dots">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
    <span class="titlebar-title" id="titlebar-text">user@blog: ~ — bash</span>
  </div>

  <div class="window" id="window" onclick="focusInput()">
    <div id="history-output"></div>
    <div class="input-line">
      <span class="prompt" id="live-prompt">
        <span class="p-user">user</span><span class="p-host">@blog</span><span class="p-sep">:</span><span class="p-path">~</span><span class="p-arrow">$</span>
      </span>
      <input id="cmd-input" type="text" autocomplete="off" autocorrect="off"
             autocapitalize="off" spellcheck="false" aria-label="terminal input" />
    </div>
  </div>

</main>

<script>
const FS = {
  // Each key is a directory name (use "~" for root)
  "~": {
    dirs: ["projects", "articles"],
    files: {
      "readme.txt": { desc: "You're already reading it.", url: null }
    }
  },
  "projects": {
    dirs:  [],
    files: {
      "github": { desc: "All my open-source repos.", url: "https://github.com/maranas" },
      "tagalog-wordle": { desc: "Wordle in Tagalog. A react-native-web test.", url: "https://maranas.github.io/tagwordle/" },
      "wc2026-dashboard.html": { desc: "World Cup 2026: Football Manager style", url: "https://maranas.github.io/wc2026-dashboard.html" }
    }
  },
  "articles": {
    dirs: ["2012"],
    files: {}
  },
  "2012": {
    dirs: [],
    files: {
      "chip8-emulators": { desc: "My blog post on making your own chip8 emulator.", url: "https://omokute.blogspot.com/2012/06/emulation-basics-write-your-own-chip-8.html" }
    }
  }
};

const WHOAMI = `Moises — developer, tinkerer, amateur watchmaker.
Mostly tinkering. Nowadays with LLMs,
usually locally if I have run out of tokens.
Type 'help' to see what you can do here.`;

let cwd = "~";           // current directory
let cmdHistory = [];     // typed command history
let histIdx = -1;        // arrow-key position in history
let tabCandidates = [];  // last tab-completion candidates
let tabIdx = 0;

const histOut = document.getElementById("history-output");
const input = document.getElementById("cmd-input");
const livePrompt = document.getElementById("live-prompt");
const titlebar = document.getElementById("titlebar-text");
const win = document.getElementById("window");

function focusInput() { input.focus(); }
window.addEventListener("load", focusInput);

function promptStr(dir) {
  const path = dir === "~" ? "~" : `~/${resolvedPath(dir)}`;
  return `<span class="p-user">user</span><span class="p-host">@blog</span><span class="p-sep">:</span><span class="p-path">${path}</span><span class="p-arrow">$</span>`;
}

function updatePrompt() {
  const path = cwd === "~" ? "~" : `~/${resolvedPath(cwd)}`;
  livePrompt.innerHTML = promptStr(cwd);
  titlebar.textContent = `user@blog: ${path} — bash`;
}

// Build relative path from root to a dir name
function resolvedPath(dir) {
  if (dir === "~") return "";
  // BFS to find path
  function bfs(node, target, prefix) {
    if (node === target) return prefix;
    for (const child of (FS[node]?.dirs || [])) {
      const result = bfs(child, target, prefix ? `${prefix}/${child}` : child);
      if (result !== null) return result;
    }
    return null;
  }
  return bfs("~", dir, "") || dir;
}

function appendEntry(cmdText, outputHTML, cls = "") {
  const entry = document.createElement("div");
  entry.className = "entry";
  entry.innerHTML = `
    <div class="entry-cmd">
      <span class="prompt">${promptStr(cwd)}</span>
      <span>${escHtml(cmdText)}</span>
    </div>
    ${outputHTML ? `<div class="entry-out ${cls}">${outputHTML}</div>` : ""}
  `;
  histOut.appendChild(entry);
  win.scrollTop = win.scrollHeight;
}

function err(msg) { return `<span style="color:var(--red)">${escHtml(msg)}</span>`; }
function dim(msg) { return `<span style="color:var(--green-dim)">${escHtml(msg)}</span>`; }
function blue(msg) { return `<span class="dir-name">${escHtml(msg)}/</span>`; }
function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

const COMMANDS = {

  help(args) {
    return `<pre style="color:var(--green-dim)">Available commands:

  <span style="color:var(--green)">ls</span>  [dir]        list files and directories
  <span style="color:var(--green)">cd</span>  &lt;dir&gt;        change directory  (cd .. to go up)
  <span style="color:var(--green)">open</span> &lt;name&gt;      open a link by file name
  <span style="color:var(--green)">cat</span>  &lt;name&gt;      read a file description
  <span style="color:var(--green)">whoami</span>           about this site's author
  <span style="color:var(--green)">pwd</span>              print working directory
  <span style="color:var(--green)">echo</span> &lt;text&gt;      print text
  <span style="color:var(--green)">history</span>          show command history
  <span style="color:var(--green)">clear</span>            clear the terminal

Tips:
  ↑ / ↓  navigate command history
  Tab     autocomplete commands &amp; file names</pre>`;
  },

  ls(args) {
    const target = args[0] ? resolveDirArg(args[0]) : cwd;
    if (!target) return err(`ls: cannot access '${args[0]}': no such directory`);
    const node = FS[target];
    if (!node) return err(`ls: cannot access '${args[0]}': no such directory`);

    let out = "";
    const dirs  = node.dirs  || [];
    const files = Object.keys(node.files || {});

    if (dirs.length === 0 && files.length === 0) return dim("(empty)");

    dirs.forEach(d  => out += blue(d) + "  ");
    files.forEach(f => out += `<span class="file-name">${escHtml(f)}</span>  `);
    return `<div style="line-height:2">${out}</div>`;
  },

  cd(args) {
    if (!args[0] || args[0] === "~") { cwd = "~"; updatePrompt(); return ""; }
    if (args[0] === "..") {
      if (cwd === "~") return dim("Already at root.");
      // find parent
      const parent = findParent(cwd);
      cwd = parent || "~";
      updatePrompt();
      return "";
    }
    const target = resolveDirArg(args[0]);
    if (!target || !FS[target]) return err(`cd: ${args[0]}: No such directory`);
    // make sure target is accessible from cwd
    const node = FS[cwd];
    if (!node.dirs.includes(target)) return err(`cd: ${args[0]}: No such directory`);
    cwd = target;
    updatePrompt();
    return "";
  },

  open(args) {
    const name = args[0];
    if (!name) return err("Usage: open <name>");
    const file = findFile(name);
    if (!file) return err(`open: '${name}': not found`);
    if (!file.url) return err(`open: '${name}': no URL associated`);
    window.open(file.url, "_blank", "noopener,noreferrer");
    return dim(`Opening ${name}…`);
  },

  cat(args) {
    const name = args[0];
    if (!name) return err("Usage: cat <name>");
    // special case for readme.txt at root
    const file = findFile(name);
    if (!file) return err(`cat: ${name}: No such file`);
    let out = escHtml(file.desc);
    if (file.url) out += `\n<a class="file-link" href="${escHtml(file.url)}" target="_blank" rel="noopener">${escHtml(file.url)}</a>`;
    return `<pre>${out}</pre>`;
  },

  whoami() {
    return `<pre>${escHtml(WHOAMI)}</pre>`;
  },

  pwd() {
    const path = cwd === "~" ? "~" : `~/${resolvedPath(cwd)}`;
    return escHtml(path);
  },

  echo(args) {
    return escHtml(args.join(" "));
  },

  history() {
    if (cmdHistory.length === 0) return dim("No commands yet.");
    return cmdHistory
      .map((c, i) => `<span style="color:var(--green-dim)">${String(i+1).padStart(3," ")}  </span>${escHtml(c)}`)
      .join("\n");
  },

  clear() {
    histOut.innerHTML = "";
    return null; // null = don't append anything
  }
};

function resolveDirArg(arg) {
  // Strip trailing slash
  const name = arg.replace(/\/$/, "");
  if (FS[name]) return name;
  return null;
}

function findParent(dir) {
  for (const [key, node] of Object.entries(FS)) {
    if ((node.dirs || []).includes(dir)) return key;
  }
  return "~";
}

function findFile(name) {
  // Search current dir first, then all dirs
  const cur = FS[cwd]?.files?.[name];
  if (cur) return cur;
  for (const node of Object.values(FS)) {
    if (node.files?.[name]) return node.files[name];
  }
  return null;
}

const CMD_NAMES = Object.keys(COMMANDS);

function tabComplete() {
  const raw   = input.value;
  const parts = raw.trimStart().split(/\s+/);

  if (parts.length === 1) {
    // Complete command name
    const prefix = parts[0];
    const matches = CMD_NAMES.filter(c => c.startsWith(prefix));
    cycle(matches, prefix, "");
  } else {
    // Complete argument
    const cmd = parts[0];
    const prefix = parts[parts.length - 1];
    const node = FS[cwd];
    let candidates = [];

    if (cmd === "cd") {
      candidates = (node?.dirs || []).filter(d => d.startsWith(prefix));
    } else if (cmd === "ls") {
      candidates = [
        ...(node?.dirs  || []).filter(d => d.startsWith(prefix)),
        ...Object.keys(node?.files || {}).filter(f => f.startsWith(prefix))
      ];
    } else if (["open","cat"].includes(cmd)) {
      candidates = Object.keys(node?.files || {}).filter(f => f.startsWith(prefix));
    }
    cycle(candidates, prefix, parts.slice(0, -1).join(" ") + " ");
  }
}

function cycle(matches, prefix, base) {
  if (matches.length === 0) return;
  if (matches.length === 1) {
    input.value = base + matches[0];
    tabCandidates = []; tabIdx = 0;
    return;
  }
  // Multiple — cycle through
  if (JSON.stringify(tabCandidates) !== JSON.stringify(matches)) {
    tabCandidates = matches; tabIdx = 0;
  } else {
    tabIdx = (tabIdx + 1) % tabCandidates.length;
  }
  input.value = base + tabCandidates[tabIdx];
}

input.addEventListener("keydown", e => {
  if (e.key === "Tab") {
    e.preventDefault();
    tabComplete();
    return;
  }
  // Reset tab cycling on any other key
  tabCandidates = [];

  if (e.key === "ArrowUp") {
    e.preventDefault();
    if (cmdHistory.length === 0) return;
    histIdx = Math.min(histIdx + 1, cmdHistory.length - 1);
    input.value = cmdHistory[cmdHistory.length - 1 - histIdx];
    return;
  }
  if (e.key === "ArrowDown") {
    e.preventDefault();
    if (histIdx <= 0) { histIdx = -1; input.value = ""; return; }
    histIdx--;
    input.value = cmdHistory[cmdHistory.length - 1 - histIdx];
    return;
  }
  if (e.key === "Enter") {
    const raw = input.value.trim();
    input.value = "";
    histIdx = -1;

    if (!raw) { appendEntry("", ""); return; }

    // Save to history (deduplicate consecutive)
    if (cmdHistory[cmdHistory.length - 1] !== raw) cmdHistory.push(raw);

    const [cmd, ...args] = raw.split(/\s+/);
    const fn = COMMANDS[cmd];

    if (!fn) {
      appendEntry(raw, err(`command not found: ${cmd}  (try 'help')`));
    } else {
      const out = fn(args);
      if (out !== null) appendEntry(raw, out ?? "");
      else appendEntry(raw, ""); // clear already wiped histOut
    }

    win.scrollTop = win.scrollHeight;
  }
});

(function boot() {
  const lines = [
    { cmd: "cat welcome.txt", out: "Hello, welcome to my github page!\nIf you are here, you probably already know how to find my github projects.", cls: "" },
    { cmd: "echo \"Type 'help' to see available commands.\"", out: "Type 'help' to see available commands.", cls: "info" },
  ];
  lines.forEach(({ cmd, out, cls }) => {
    const entry = document.createElement("div");
    entry.className = "entry";
    entry.innerHTML = `
      <div class="entry-cmd">
        <span class="prompt">${promptStr("~")}</span>
        <span>${escHtml(cmd)}</span>
      </div>
      <div class="entry-out ${cls}">${escHtml(out)}</div>
    `;
    histOut.appendChild(entry);
  });
  updatePrompt();
  focusInput();
})();
</script>
</body>
</html>
